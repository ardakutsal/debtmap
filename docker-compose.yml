services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/debtmap.db
      FERNET_KEY: ${FERNET_KEY}
      CORS_ORIGINS_CSV: http://localhost:3000
      # Optional — set one to enable Deep Scan (LLM architect review)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - debtmap_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  # The worker image runs `celery worker -B`: analysis tasks + the embedded
  # beat scheduler (hourly token purge, weekly leaderboard refresh) in one
  # container — no separate beat service needed.
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/debtmap.db
      FERNET_KEY: ${FERNET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - debtmap_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  debtmap_data:
