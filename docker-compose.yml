version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/debtmap.db
      FERNET_KEY: ${FERNET_KEY:-<FERNET-KEY-ROTATED-AND-REMOVED>=}
      CORS_ORIGINS_CSV: http://localhost:3000
    volumes:
      - debtmap_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/debtmap.db
      FERNET_KEY: ${FERNET_KEY:-<FERNET-KEY-ROTATED-AND-REMOVED>=}
    volumes:
      - debtmap_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  debtmap_data:
